name: Index Unindexed NuGet Tools
run-name: >-
  Index Unindexed NuGet Tools / ${{ inputs.target_branch }} / batch ${{ inputs.batch_size }}

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives promoted index and state updates
        required: true
        default: main
        type: string
      state_branch:
        description: Branch that stores the latest discovery snapshot
        required: true
        default: automation/discovery-state
        type: string
      batch_prefix:
        description: Prefix used when naming analysis batches
        required: false
        default: current-backfill-all
        type: string
      batch_size:
        description: Maximum queue items per batch
        required: true
        default: "250"
        type: string
      artifact_retention_days:
        description: Analysis artifact retention in days
        required: false
        default: "30"
        type: string

permissions:
  actions: read
  contents: write
  packages: read

concurrency:
  group: index-unindexed-nuget-tools-${{ inputs.target_branch }}-${{ inputs.state_branch }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      target_branch: ${{ steps.dispatch.outputs.target_branch }}
      queue_item_count: ${{ steps.dispatch.outputs.queue_item_count }}
      batch_count: ${{ steps.dispatch.outputs.batch_count }}
      matrix: ${{ steps.dispatch.outputs.matrix }}
      queue_artifact_name: ${{ steps.queue.outputs.queue_artifact_name }}
      global_batch_id: ${{ steps.dispatch.outputs.global_batch_id }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.target_branch }}

      - name: Load discovery snapshot from state branch
        shell: pwsh
        run: |
          $stateBranch = '${{ inputs.state_branch }}'
          git fetch origin $stateBranch --depth=1

          $stateFiles = @(
            git ls-tree -r --name-only FETCH_HEAD state/discovery
          )

          if ($stateFiles.Count -eq 0) {
            throw "State branch '$stateBranch' does not contain state/discovery."
          }

          git checkout FETCH_HEAD -- state/discovery

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install discovery tool
        id: install_tool
        uses: ./.github/actions/install-discovery-tool
        with:
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}
          github-owner: ${{ github.repository_owner }}

      - name: Build current-analysis backfill queue
        id: queue
        shell: pwsh
        run: |
          $queuePath = Join-Path $env:RUNNER_TEMP 'dotnet-tools.current-backfill.queue.json'
          $queue = inspectra-discovery `
            queue backfill-current-analysis `
            --current-snapshot state/discovery/dotnet-tools.current.json `
            --output $queuePath `
            --json | ConvertFrom-Json

          if (-not $queue.ok) {
            throw $queue.error.message
          }

          $queue = $queue.data
          "queue_path=$queuePath" >> $env:GITHUB_OUTPUT
          "queue_item_count=$($queue.queueCount)" >> $env:GITHUB_OUTPUT
          "queue_artifact_name=current-analysis-backfill-queue" >> $env:GITHUB_OUTPUT

      - name: Build global plan and dispatch plan
        id: dispatch
        if: ${{ steps.queue.outputs.queue_item_count != '0' }}
        shell: pwsh
        run: |
          $queuePath = '${{ steps.queue.outputs.queue_path }}'
          $targetBranch = '${{ inputs.target_branch }}'
          $stateBranch = '${{ inputs.state_branch }}'
          $batchPrefix = '${{ inputs.batch_prefix }}'
          $batchSize = [int]'${{ inputs.batch_size }}'
          $dispatchPath = Join-Path $env:RUNNER_TEMP 'queue-dispatch-plan.json'
          $expectedPath = Join-Path $env:RUNNER_TEMP 'expected.json'
          $globalBatchId = "$batchPrefix-all-$([DateTimeOffset]::UtcNow.ToString('yyyyMMddTHHmmssZ').ToLowerInvariant())"

          $dispatchPlan = inspectra-discovery `
            queue dispatch-plan `
            --queue $queuePath `
            --target-branch $targetBranch `
            --state-branch $stateBranch `
            --batch-prefix $batchPrefix `
            --batch-size $batchSize `
            --output $dispatchPath `
            --json | ConvertFrom-Json

          if (-not $dispatchPlan.ok) {
            throw $dispatchPlan.error.message
          }

          $dispatchPlan = $dispatchPlan.data

          $globalPlan = inspectra-discovery `
            queue untrusted-batch-plan `
            --queue $queuePath `
            --batch-id $globalBatchId `
            --output $expectedPath `
            --target-branch $targetBranch `
            --json | ConvertFrom-Json

          if (-not $globalPlan.ok) {
            throw $globalPlan.error.message
          }

          "target_branch=$targetBranch" >> $env:GITHUB_OUTPUT
          "queue_item_count=$($dispatchPlan.queueItemCount)" >> $env:GITHUB_OUTPUT
          "batch_count=$($dispatchPlan.batchCount)" >> $env:GITHUB_OUTPUT
          "global_batch_id=$globalBatchId" >> $env:GITHUB_OUTPUT
          "matrix<<EOF" >> $env:GITHUB_OUTPUT
          ((@($dispatchPlan.batches) | ConvertTo-Json -Compress -AsArray) ?? '[]') >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Report empty queue
        if: ${{ steps.queue.outputs.queue_item_count == '0' }}
        shell: pwsh
        run: |
          Write-Host 'No unindexed current-analysis backlog remains.'

      - name: Upload queue artifact
        if: ${{ steps.queue.outputs.queue_item_count != '0' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.queue.outputs.queue_artifact_name }}
          path: ${{ steps.queue.outputs.queue_path }}
          if-no-files-found: error
          retention-days: ${{ fromJson(inputs.artifact_retention_days) }}

      - name: Upload global expected plan
        if: ${{ steps.queue.outputs.queue_item_count != '0' }}
        uses: actions/upload-artifact@v6
        with:
          name: global-untrusted-plan
          path: ${{ runner.temp }}/expected.json
          if-no-files-found: error
          retention-days: ${{ fromJson(inputs.artifact_retention_days) }}

  analyze:
    needs: plan
    if: ${{ needs.plan.outputs.queue_item_count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/analyze-untrusted-batch.yml
    with:
      batch_id: ${{ matrix.batchId }}
      queue_path: ${{ matrix.queuePath }}
      offset: ${{ matrix.offset }}
      take: ${{ matrix.take }}
      state_branch: ${{ matrix.stateBranch }}
      target_branch: ${{ matrix.targetBranch }}
      force_reanalyze: "false"
      queue_artifact_name: ${{ needs.plan.outputs.queue_artifact_name }}
      upload_plan_artifact: "false"
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
    secrets: inherit

  promote:
    needs:
      - plan
      - analyze
    if: ${{ always() && needs.plan.outputs.queue_item_count != '0' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ needs.plan.outputs.target_branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install discovery tool
        uses: ./.github/actions/install-discovery-tool
        with:
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}
          github-owner: ${{ github.repository_owner }}

      - name: Download analysis artifacts
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/untrusted-download

      - name: Promote analysis outputs
        id: promote
        shell: pwsh
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          $summary = inspectra-discovery `
            promotion apply-untrusted `
            --download-root $downloadRoot `
            --summary-output $summaryPath `
            --json | ConvertFrom-Json

          if (-not $summary.ok) {
            throw $summary.error.message
          }

          $summary = Get-Content $summaryPath -Raw | ConvertFrom-Json
          "success_count=$($summary.successCount)" >> $env:GITHUB_OUTPUT
          "terminal_negative_count=$($summary.terminalNegativeCount)" >> $env:GITHUB_OUTPUT
          "retryable_failure_count=$($summary.retryableFailureCount)" >> $env:GITHUB_OUTPUT
          "terminal_failure_count=$($summary.terminalFailureCount)" >> $env:GITHUB_OUTPUT
          "missing_count=$($summary.missingCount)" >> $env:GITHUB_OUTPUT

      - name: Regenerate fully indexed documentation report
        shell: pwsh
        run: |
          inspectra-discovery docs fully-indexed-report

      - name: Commit promoted outputs directly to target branch
        id: commit
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index state docs/Reports

          git diff --cached --quiet --exit-code
          if ($LASTEXITCODE -eq 0) {
            $currentSha = (git rev-parse HEAD).Trim()
            "commit_created=false" >> $env:GITHUB_OUTPUT
            "commit_sha=$currentSha" >> $env:GITHUB_OUTPUT
            Write-Host "No promotion changes to commit on ${{ needs.plan.outputs.target_branch }}."
            exit 0
          }

          git commit -m "chore(index): backfill unindexed tools ${{ needs.plan.outputs.global_batch_id }}"
          git push origin "HEAD:${{ needs.plan.outputs.target_branch }}"

          $commitSha = (git rev-parse HEAD).Trim()
          "commit_created=true" >> $env:GITHUB_OUTPUT
          "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT

      - name: Report promotion result
        shell: pwsh
        run: |
          Write-Host "Target branch: ${{ needs.plan.outputs.target_branch }}"
          Write-Host "Queued items: ${{ needs.plan.outputs.queue_item_count }}"
          Write-Host "Batch count: ${{ needs.plan.outputs.batch_count }}"
          Write-Host "Success: ${{ steps.promote.outputs.success_count }}"
          Write-Host "Terminal negative: ${{ steps.promote.outputs.terminal_negative_count }}"
          Write-Host "Retryable failure: ${{ steps.promote.outputs.retryable_failure_count }}"
          Write-Host "Terminal failure: ${{ steps.promote.outputs.terminal_failure_count }}"
          Write-Host "Missing artifacts: ${{ steps.promote.outputs.missing_count }}"
          Write-Host "Commit created: ${{ steps.commit.outputs.commit_created }}"
          Write-Host "Commit SHA: ${{ steps.commit.outputs.commit_sha }}"
