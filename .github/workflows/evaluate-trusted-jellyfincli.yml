name: Evaluate Trusted JellyfinCli

on:
  workflow_dispatch:
    inputs:
      version:
        description: JellyfinCli package version to evaluate
        required: true
        default: 0.1.16

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: trusted-jellyfincli-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Evaluate JellyfinCli
        shell: pwsh
        run: |
          ./scripts/Invoke-TrustedToolEvaluation.ps1 `
            -PackageId 'JellyfinCli' `
            -Version '${{ inputs.version }}' `
            -Source 'workflow-dispatch' `
            -Trusted

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/jellyfincli-${{ inputs.version }}
          delete-branch: true
          add-paths: |
            queue/**
            generated/**
            index/**
          commit-message: |
            chore(generated): evaluate JellyfinCli ${{ inputs.version }}

            Trusted single-package evaluation for JellyfinCli.
          title: chore(generated): evaluate JellyfinCli ${{ inputs.version }}
          body: |
            Evaluate trusted CLI `JellyfinCli` version `${{ inputs.version }}`.

            This workflow:
            - downloads the exact NuGet tool package
            - resolves the command name from `DotnetToolSettings.xml`
            - installs the tool in an isolated `--tool-path`
            - runs `cli opencli` and `cli xmldoc`
            - writes queue, generated, and rolled-up index files

            Generated by `${{ github.workflow }}`.

      - name: Report pull request result
        shell: pwsh
        run: |
          Write-Host "Pull request operation: ${{ steps.cpr.outputs.pull-request-operation }}"
          if ('${{ steps.cpr.outputs.pull-request-url }}') {
            Write-Host "Pull request URL: ${{ steps.cpr.outputs.pull-request-url }}"
          }
