name: Promote Untrusted Analysis Results
run-name: >-
  Promote Untrusted Analysis Results / ${{ github.event.inputs.analysis_run_id || github.event.workflow_run.id || 'auto' }}

on:
  workflow_dispatch:
    inputs:
      analysis_run_id:
        description: Completed Analyze Untrusted Batch run id to promote
        required: true
        type: string
  workflow_run:
    workflows:
      - Analyze Untrusted Batch
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: promote-untrusted-${{ github.event.inputs.analysis_run_id || github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  promote:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve analysis run
        id: source
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $analysisRunId = if ('${{ github.event.inputs.analysis_run_id }}') {
            '${{ github.event.inputs.analysis_run_id }}'
          }
          elseif ('${{ github.event.workflow_run.id }}') {
            '${{ github.event.workflow_run.id }}'
          }
          else {
            throw 'No analysis run id was provided.'
          }

          $run = gh run view $analysisRunId `
            --repo '${{ github.repository }}' `
            --json databaseId,url,status,conclusion,workflowName,headBranch | ConvertFrom-Json

          if ($run.workflowName -ne 'Analyze Untrusted Batch') {
            throw "Run '$analysisRunId' is not an Analyze Untrusted Batch run."
          }

          if ($run.status -ne 'completed') {
            throw "Analysis run '$analysisRunId' is still '$($run.status)'."
          }

          if ($run.conclusion -ne 'success') {
            throw "Analysis run '$analysisRunId' completed with conclusion '$($run.conclusion)'."
          }

          "analysis_run_id=$analysisRunId" >> $env:GITHUB_OUTPUT
          "analysis_run_url=$($run.url)" >> $env:GITHUB_OUTPUT
          "head_branch=$($run.headBranch)" >> $env:GITHUB_OUTPUT

      - name: Download workflow artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          New-Item -ItemType Directory -Path $downloadRoot -Force | Out-Null
          gh run download ${{ steps.source.outputs.analysis_run_id }} `
            --repo ${{ github.repository }} `
            --dir $downloadRoot

      - name: Resolve promotion plan
        id: plan
        shell: pwsh
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          $expectedPath = Get-ChildItem -Path $downloadRoot -Filter 'expected.json' -Recurse |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $expectedPath) {
            throw "expected.json was not found under '$downloadRoot'."
          }

          $plan = Get-Content $expectedPath -Raw | ConvertFrom-Json
          $targetBranch = if (
            $plan.PSObject.Properties.Name -contains 'targetBranch' -and
            -not [string]::IsNullOrWhiteSpace([string]$plan.targetBranch)
          ) {
            [string]$plan.targetBranch
          }
          else {
            'main'
          }

          $batchId = [string]$plan.batchId
          $releaseTag = ('untrusted-analysis-{0}-{1}' -f $batchId, '${{ steps.source.outputs.analysis_run_id }}').ToLowerInvariant()

          "batch_id=$batchId" >> $env:GITHUB_OUTPUT
          "target_branch=$targetBranch" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_title=Promote untrusted analysis $batchId" >> $env:GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ steps.plan.outputs.target_branch }}

      - name: Promote analysis outputs
        id: promote
        shell: pwsh
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          ./scripts/Invoke-UntrustedAnalysisPromotion.ps1 `
            -DownloadRoot $downloadRoot `
            -SummaryOutputPath $summaryPath

          $summary = Get-Content $summaryPath -Raw | ConvertFrom-Json
          "success_count=$($summary.successCount)" >> $env:GITHUB_OUTPUT
          "terminal_negative_count=$($summary.terminalNegativeCount)" >> $env:GITHUB_OUTPUT
          "retryable_failure_count=$($summary.retryableFailureCount)" >> $env:GITHUB_OUTPUT
          "terminal_failure_count=$($summary.terminalFailureCount)" >> $env:GITHUB_OUTPUT
          "missing_count=$($summary.missingCount)" >> $env:GITHUB_OUTPUT
          "summary_path=$summaryPath" >> $env:GITHUB_OUTPUT

      - name: Write promotion notes
        id: notes
        shell: pwsh
        run: |
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          $bodyPath = Join-Path $env:RUNNER_TEMP 'promotion-notes.md'
          ./scripts/Write-UntrustedPromotionPullRequestBody.ps1 `
            -SummaryPath $summaryPath `
            -WorkflowRunUrl '${{ steps.source.outputs.analysis_run_url }}' `
            -BodyOutputPath $bodyPath

          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Commit promoted outputs directly to target branch
        id: commit
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index state

          git diff --cached --quiet --exit-code
          if ($LASTEXITCODE -eq 0) {
            $currentSha = (git rev-parse HEAD).Trim()
            "commit_created=false" >> $env:GITHUB_OUTPUT
            "commit_sha=$currentSha" >> $env:GITHUB_OUTPUT
            Write-Host "No promotion changes to commit on ${{ steps.plan.outputs.target_branch }}."
            exit 0
          }

          git commit -m "chore(index): promote untrusted analysis ${{ steps.plan.outputs.batch_id }}"
          git push origin "HEAD:${{ steps.plan.outputs.target_branch }}"

          $commitSha = (git rev-parse HEAD).Trim()
          "commit_created=true" >> $env:GITHUB_OUTPUT
          "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT
          Write-Host "Pushed promotion commit $commitSha to ${{ steps.plan.outputs.target_branch }}."

      - name: Create GitHub release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repository = '${{ github.repository }}'
          $tag = '${{ steps.plan.outputs.release_tag }}'
          $title = '${{ steps.plan.outputs.release_title }}'
          $target = '${{ steps.commit.outputs.commit_sha }}'
          $bodyPath = '${{ steps.notes.outputs.body_path }}'
          $summaryPath = '${{ steps.promote.outputs.summary_path }}'

          $existing = $null
          try {
            $existing = gh release view $tag --repo $repository --json url | ConvertFrom-Json
          }
          catch {
            $existing = $null
          }

          if ($existing) {
            gh release edit $tag `
              --repo $repository `
              --title $title `
              --notes-file $bodyPath | Out-Null
            $releaseOperation = 'updated'
          }
          else {
            gh release create $tag $summaryPath `
              --repo $repository `
              --target $target `
              --title $title `
              --notes-file $bodyPath | Out-Null
            $releaseOperation = 'created'
          }

          $release = gh release view $tag --repo $repository --json url | ConvertFrom-Json
          "release_url=$($release.url)" >> $env:GITHUB_OUTPUT
          "release_operation=$releaseOperation" >> $env:GITHUB_OUTPUT

      - name: Report promotion result
        shell: pwsh
        run: |
          Write-Host "Target branch: ${{ steps.plan.outputs.target_branch }}"
          Write-Host "Commit created: ${{ steps.commit.outputs.commit_created }}"
          Write-Host "Commit SHA: ${{ steps.commit.outputs.commit_sha }}"
          if ('${{ steps.release.outputs.release_url }}') {
            Write-Host "Release operation: ${{ steps.release.outputs.release_operation }}"
            Write-Host "Release URL: ${{ steps.release.outputs.release_url }}"
          }
