name: Promote Untrusted Analysis Results

on:
  workflow_run:
    workflows:
      - Analyze Untrusted Batch
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: promote-untrusted-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Download workflow artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          New-Item -ItemType Directory -Path $downloadRoot -Force | Out-Null
          gh run download ${{ github.event.workflow_run.id }} `
            --repo ${{ github.repository }} `
            --dir $downloadRoot

      - name: Promote analysis outputs
        id: promote
        shell: pwsh
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          $bodyPath = Join-Path $env:RUNNER_TEMP 'promotion-body.md'
          ./scripts/Invoke-UntrustedAnalysisPromotion.ps1 `
            -DownloadRoot $downloadRoot `
            -SummaryOutputPath $summaryPath

          $summary = Get-Content $summaryPath -Raw | ConvertFrom-Json
          ./scripts/Write-UntrustedPromotionPullRequestBody.ps1 `
            -SummaryPath $summaryPath `
            -WorkflowRunUrl '${{ github.event.workflow_run.html_url }}' `
            -BodyOutputPath $bodyPath

          "batch_id=$($summary.batchId)" >> $env:GITHUB_OUTPUT
          "success_count=$($summary.successCount)" >> $env:GITHUB_OUTPUT
          "terminal_negative_count=$($summary.terminalNegativeCount)" >> $env:GITHUB_OUTPUT
          "retryable_failure_count=$($summary.retryableFailureCount)" >> $env:GITHUB_OUTPUT
          "terminal_failure_count=$($summary.terminalFailureCount)" >> $env:GITHUB_OUTPUT
          "missing_count=$($summary.missingCount)" >> $env:GITHUB_OUTPUT
          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/untrusted-${{ steps.promote.outputs.batch_id }}-${{ github.event.workflow_run.id }}
          delete-branch: true
          add-paths: |
            index/**
            state/**
          commit-message: |
            chore(index): promote untrusted analysis ${{ steps.promote.outputs.batch_id }}

            Promote artifact-only analysis results for an untrusted batch.
          title: "chore(index): promote untrusted analysis ${{ steps.promote.outputs.batch_id }}"
          body-path: ${{ steps.promote.outputs.body_path }}

      - name: Publish non-success follow-up comments
        id: followups
        if: ${{ steps.cpr.outputs.pull-request-url != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          $commentIndexPath = Join-Path $env:RUNNER_TEMP 'promotion-comment-index.json'
          ./scripts/Publish-UntrustedPromotionComments.ps1 `
            -SummaryPath $summaryPath `
            -Repository '${{ github.repository }}' `
            -PullRequestNumber '${{ steps.cpr.outputs.pull-request-number }}' `
            -WorkflowRunUrl '${{ github.event.workflow_run.html_url }}' `
            -CommentIndexOutputPath $commentIndexPath

          "comment_index_path=$commentIndexPath" >> $env:GITHUB_OUTPUT

      - name: Update pull request body with follow-up links
        if: ${{ steps.cpr.outputs.pull-request-url != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          $bodyPath = Join-Path $env:RUNNER_TEMP 'promotion-body.md'
          ./scripts/Write-UntrustedPromotionPullRequestBody.ps1 `
            -SummaryPath $summaryPath `
            -WorkflowRunUrl '${{ github.event.workflow_run.html_url }}' `
            -BodyOutputPath $bodyPath `
            -CommentIndexPath '${{ steps.followups.outputs.comment_index_path }}'

          gh pr edit '${{ steps.cpr.outputs.pull-request-number }}' `
            --repo '${{ github.repository }}' `
            --body-file $bodyPath

      - name: Report pull request result
        shell: pwsh
        run: |
          Write-Host "Pull request operation: ${{ steps.cpr.outputs.pull-request-operation }}"
          if ('${{ steps.cpr.outputs.pull-request-url }}') {
            Write-Host "Pull request URL: ${{ steps.cpr.outputs.pull-request-url }}"
          }
