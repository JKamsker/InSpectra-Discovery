name: Promote Untrusted Analysis Results

on:
  workflow_run:
    workflows:
      - Analyze Untrusted Batch
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: promote-untrusted-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Download workflow artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          New-Item -ItemType Directory -Path $downloadRoot -Force | Out-Null
          gh run download ${{ github.event.workflow_run.id }} `
            --repo ${{ github.repository }} `
            --dir $downloadRoot

      - name: Promote analysis outputs
        id: promote
        shell: pwsh
        run: |
          $downloadRoot = Join-Path $env:RUNNER_TEMP 'untrusted-download'
          $summaryPath = Join-Path $env:RUNNER_TEMP 'promotion-summary.json'
          $bodyPath = Join-Path $env:RUNNER_TEMP 'promotion-body.md'
          ./scripts/Invoke-UntrustedAnalysisPromotion.ps1 `
            -DownloadRoot $downloadRoot `
            -SummaryOutputPath $summaryPath

          $summary = Get-Content $summaryPath -Raw | ConvertFrom-Json
          $nonSuccessItems = @($summary.nonSuccessItems)
          $mdTick = [string][char]96

          $bodyLines = @(
            "Promote the completed untrusted analysis batch $mdTick$($summary.batchId)$mdTick.",
            '',
            'Source workflow run:',
            "- $mdTick${{ github.event.workflow_run.html_url }}$mdTick",
            '',
            'Result summary:',
            "- Success: $mdTick$($summary.successCount)$mdTick",
            "- Terminal negative: $mdTick$($summary.terminalNegativeCount)$mdTick",
            "- Retryable failure: $mdTick$($summary.retryableFailureCount)$mdTick",
            "- Terminal failure: $mdTick$($summary.terminalFailureCount)$mdTick",
            "- Missing artifacts: $mdTick$($summary.missingCount)$mdTick",
            '',
            'Non-success details:'
          )

          if ($nonSuccessItems.Count -eq 0) {
            $bodyLines += '- None.'
          }
          else {
            foreach ($item in $nonSuccessItems) {
              $bodyLines += ''
              $bodyLines += "### $mdTick$($item.packageId) $($item.version)$mdTick"
              $bodyLines += "- Status: $mdTick$($item.status)$mdTick"
              $bodyLines += "- Disposition: $mdTick$($item.disposition)$mdTick"
              $bodyLines += "- Phase: $mdTick$($item.phase)$mdTick"
              $bodyLines += "- Classification: $mdTick$($item.classification)$mdTick"
              $bodyLines += '- Reason:'
              $bodyLines += '```text'
              $bodyLines += [string]$item.reason
              $bodyLines += '```'
            }
          }

          $bodyLines += ''
          $bodyLines += 'Generated by `Promote Untrusted Analysis Results`.'
          [System.IO.File]::WriteAllText($bodyPath, ($bodyLines -join [Environment]::NewLine) + [Environment]::NewLine, [System.Text.UTF8Encoding]::new($false))

          "batch_id=$($summary.batchId)" >> $env:GITHUB_OUTPUT
          "success_count=$($summary.successCount)" >> $env:GITHUB_OUTPUT
          "terminal_negative_count=$($summary.terminalNegativeCount)" >> $env:GITHUB_OUTPUT
          "retryable_failure_count=$($summary.retryableFailureCount)" >> $env:GITHUB_OUTPUT
          "terminal_failure_count=$($summary.terminalFailureCount)" >> $env:GITHUB_OUTPUT
          "missing_count=$($summary.missingCount)" >> $env:GITHUB_OUTPUT
          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/untrusted-${{ steps.promote.outputs.batch_id }}-${{ github.event.workflow_run.id }}
          delete-branch: true
          add-paths: |
            index/**
            state/**
          commit-message: |
            chore(index): promote untrusted analysis ${{ steps.promote.outputs.batch_id }}

            Promote artifact-only analysis results for an untrusted batch.
          title: "chore(index): promote untrusted analysis ${{ steps.promote.outputs.batch_id }}"
          body-path: ${{ steps.promote.outputs.body_path }}

      - name: Report pull request result
        shell: pwsh
        run: |
          Write-Host "Pull request operation: ${{ steps.cpr.outputs.pull-request-operation }}"
          if ('${{ steps.cpr.outputs.pull-request-url }}') {
            Write-Host "Pull request URL: ${{ steps.cpr.outputs.pull-request-url }}"
          }
