name: Queue Indexed Package History Backfill

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives the promotion pull requests
        required: true
        default: main
        type: string
      state_branch:
        description: Branch that stores the backfill queue
        required: true
        default: automation/backfill-state
        type: string
      queue_path:
        description: Queue JSON path to write on the state branch
        required: true
        default: state/backfill/indexed-package-history.queue.json
        type: string
      batch_size:
        description: Maximum queue items per dispatched analysis batch
        required: true
        default: "250"
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: queue-indexed-package-history-backfill-${{ inputs.target_branch }}-${{ inputs.state_branch }}
  cancel-in-progress: false

jobs:
  queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref_name }}

      - name: Build indexed package history backfill queue
        id: queue
        shell: pwsh
        run: |
          $queuePath = '${{ inputs.queue_path }}'
          ./scripts/Export-IndexedMetadataBackfillQueue.ps1 `
            -IndexPath 'index/all.json' `
            -OutputPath $queuePath

          $queue = Get-Content $queuePath -Raw | ConvertFrom-Json
          "item_count=$($queue.itemCount)" >> $env:GITHUB_OUTPUT
          "batch_prefix=$($queue.batchPrefix)" >> $env:GITHUB_OUTPUT

      - name: Commit queue to state branch
        id: commit
        shell: pwsh
        run: |
          $stateBranch = '${{ inputs.state_branch }}'
          $queuePath = '${{ inputs.queue_path }}'
          $snapshotRoot = Join-Path $env:RUNNER_TEMP 'indexed-history-backfill-state-snapshot'
          $snapshotPath = Join-Path $snapshotRoot 'backfill'
          $stateWorktree = Join-Path $env:RUNNER_TEMP 'indexed-history-backfill-state-worktree'

          if (Test-Path $snapshotRoot) {
            Remove-Item $snapshotRoot -Recurse -Force
          }

          if (Test-Path $stateWorktree) {
            Remove-Item $stateWorktree -Recurse -Force
          }

          New-Item -ItemType Directory -Path $snapshotRoot -Force | Out-Null
          Copy-Item (Split-Path -Parent $queuePath) $snapshotPath -Recurse -Force

          git ls-remote --exit-code --heads origin $stateBranch *> $null
          $branchExists = $LASTEXITCODE -eq 0

          try {
            if ($branchExists) {
              git fetch origin $stateBranch --depth=1
              git worktree add --detach $stateWorktree "origin/$stateBranch"
              git -C $stateWorktree checkout -B $stateBranch "origin/$stateBranch"
            }
            else {
              git worktree add --detach $stateWorktree HEAD
              git -C $stateWorktree checkout -B $stateBranch
            }

            $targetRoot = Join-Path $stateWorktree 'state/backfill'
            if (Test-Path $targetRoot) {
              Remove-Item $targetRoot -Recurse -Force
            }

            New-Item -ItemType Directory -Path (Split-Path -Parent $targetRoot) -Force | Out-Null
            Copy-Item $snapshotPath $targetRoot -Recurse -Force

            git -C $stateWorktree config user.name 'github-actions[bot]'
            git -C $stateWorktree config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git -C $stateWorktree add state/backfill

            git -C $stateWorktree diff --cached --quiet --exit-code
            $hasChanges = $LASTEXITCODE -ne 0

            if ($hasChanges) {
              git -C $stateWorktree commit -m 'chore(backfill): queue indexed package history refresh'

              if ($branchExists) {
                git -C $stateWorktree push origin "HEAD:$stateBranch"
              }
              else {
                git -C $stateWorktree push --set-upstream origin $stateBranch
              }
            }
            elseif (-not $branchExists) {
              git -C $stateWorktree push --set-upstream origin $stateBranch
            }

            $commitSha = (git -C $stateWorktree rev-parse HEAD).Trim()
            "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT
            Write-Host "State branch $stateBranch at $commitSha"
          }
          finally {
            git worktree remove $stateWorktree --force *> $null
          }

      - name: Dispatch backfill batches
        if: ${{ steps.queue.outputs.item_count != '0' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run dispatch-discovery-queue-analysis.yml `
            --repo '${{ github.repository }}' `
            --ref '${{ github.ref_name }}' `
            -f target_branch='${{ inputs.target_branch }}' `
            -f state_branch='${{ inputs.state_branch }}' `
            -f queue_path='${{ inputs.queue_path }}' `
            -f batch_size='${{ inputs.batch_size }}' `
            -f batch_prefix='${{ steps.queue.outputs.batch_prefix }}' `
            -f force_reanalyze='false'

          Write-Host "Dispatched indexed package history backfill for ${{ steps.queue.outputs.item_count }} missing package versions."

      - name: Report empty queue
        if: ${{ steps.queue.outputs.item_count == '0' }}
        shell: pwsh
        run: |
          Write-Host 'No indexed packages were found for backfill.'
