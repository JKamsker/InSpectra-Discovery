name: Discover Dotnet Tool Updates

on:
  schedule:
    - cron: '15 21 * * *'
    - cron: '25 21 * * *'
    - cron: '35 21 * * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives analysis promotion pull requests
        required: true
        default: main
        type: string
      state_branch:
        description: Persistent branch that stores discovery state
        required: true
        default: automation/discovery-state
        type: string
      apply_mode:
        description: How discovery results should be applied
        required: true
        default: pull_request
        type: choice
        options:
          - pull_request
          - commit_and_dispatch
      overlap_minutes:
        description: Catalog overlap window in minutes
        required: true
        default: "30"
        type: string
      seed_cursor_utc:
        description: Optional ISO-8601 cursor seed if state file is missing
        required: false
        default: ""
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: discover-dotnet-tool-updates
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve run parameters
        id: resolve
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'schedule') {
            $targetBranch = 'main'
            $stateBranch = 'automation/discovery-state'
            $applyMode = 'commit_and_dispatch'
            $overlapMinutes = '30'
            $seedCursorUtc = ''
          }
          else {
            $targetBranch = '${{ inputs.target_branch }}'
            $stateBranch = '${{ inputs.state_branch }}'
            $applyMode = '${{ inputs.apply_mode }}'
            $overlapMinutes = '${{ inputs.overlap_minutes }}'
            $seedCursorUtc = '${{ inputs.seed_cursor_utc }}'
          }

          "target_branch=$targetBranch" >> $env:GITHUB_OUTPUT
          "state_branch=$stateBranch" >> $env:GITHUB_OUTPUT
          "apply_mode=$applyMode" >> $env:GITHUB_OUTPUT
          "overlap_minutes=$overlapMinutes" >> $env:GITHUB_OUTPUT
          "seed_cursor_utc=$seedCursorUtc" >> $env:GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref_name }}

      - name: Load discovery state seed
        id: state_seed
        shell: pwsh
        run: |
          $stateBranch = '${{ steps.resolve.outputs.state_branch }}'
          git ls-remote --exit-code --heads origin $stateBranch *> $null
          $branchExists = $LASTEXITCODE -eq 0

          if ($branchExists) {
            git fetch origin $stateBranch --depth=1
            $stateFiles = @(
              git ls-tree -r --name-only FETCH_HEAD state/discovery
            )

            if ($stateFiles.Count -gt 0) {
              git checkout FETCH_HEAD -- state/discovery
              Write-Host "Loaded discovery state from $stateBranch."
            }
            else {
              Write-Host "State branch $stateBranch has no state/discovery files; keeping current checkout seed."
            }
          }
          else {
            Write-Host "State branch $stateBranch does not exist; seeding from the current checkout."
          }

          "branch_exists=$($branchExists.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run dotnet-tool delta discovery
        id: delta
        shell: pwsh
        run: |
          $args = @(
            'run',
            '--project', 'src/InSpectra.Discovery.Bootstrap',
            '--',
            'index', 'delta',
            '--json',
            '--overlap-minutes', '${{ steps.resolve.outputs.overlap_minutes }}'
          )

          if (-not [string]::IsNullOrWhiteSpace('${{ steps.resolve.outputs.seed_cursor_utc }}')) {
            $args += @('--seed-cursor-utc', '${{ steps.resolve.outputs.seed_cursor_utc }}')
          }

          $result = dotnet @args | ConvertFrom-Json
          if (-not $result.ok) {
            throw $result.error.message
          }

          $data = $result.data
          "catalog_leaf_count=$($data.catalogLeafCount)" >> $env:GITHUB_OUTPUT
          "affected_package_count=$($data.affectedPackageCount)" >> $env:GITHUB_OUTPUT
          "changed_package_count=$($data.changedPackageCount)" >> $env:GITHUB_OUTPUT
          "cursor_start_utc=$(([DateTimeOffset]$data.cursorStartUtc).ToString('O'))" >> $env:GITHUB_OUTPUT
          "cursor_end_utc=$(([DateTimeOffset]$data.cursorEndUtc).ToString('O'))" >> $env:GITHUB_OUTPUT

          $bodyPath = Join-Path $env:RUNNER_TEMP 'dotnet-tool-delta-pr-body.md'
          @(
            'Discover dotnet-tool additions and latest-version changes from the NuGet catalog.'
            ''
            'Cursor:'
            "- start: $(([DateTimeOffset]$data.cursorStartUtc).ToString('O'))"
            "- end: $(([DateTimeOffset]$data.cursorEndUtc).ToString('O'))"
            ''
            'Summary:'
            "- catalog leaves scanned: $($data.catalogLeafCount)"
            "- affected package ids: $($data.affectedPackageCount)"
            "- changed packages: $($data.changedPackageCount)"
            ''
            'Updated files:'
            '- `state/discovery/dotnet-tools.current.json`'
            '- `state/discovery/dotnet-tools.delta.json`'
            '- `state/discovery/dotnet-tools.cursor.json`'
            ''
            'State branch: ${{ steps.resolve.outputs.state_branch }}'
            ''
            'Generated by `${{ github.workflow }}`.'
          ) | Set-Content -Path $bodyPath

          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Narrow delta to Spectre.Console.Cli
        if: ${{ steps.delta.outputs.changed_package_count != '0' }}
        id: spectre
        shell: pwsh
        run: |
          $result = dotnet run --project src/InSpectra.Discovery.Bootstrap -- `
            index delta-spectre-console-cli `
            --json | ConvertFrom-Json

          if (-not $result.ok) {
            throw $result.error.message
          }

          $data = $result.data
          "matched_package_count=$($data.matchedPackageCount)" >> $env:GITHUB_OUTPUT
          "queue_count=$($data.queueCount)" >> $env:GITHUB_OUTPUT
          "output_delta_path=$($data.outputDeltaPath)" >> $env:GITHUB_OUTPUT
          "queue_output_path=$($data.queueOutputPath)" >> $env:GITHUB_OUTPUT

      - name: Rewrite pull request body with Spectre.Console.Cli summary
        if: ${{ steps.delta.outputs.changed_package_count != '0' }}
        shell: pwsh
        run: |
          $bodyPath = '${{ steps.delta.outputs.body_path }}'
          @(
            'Discover dotnet-tool additions and latest-version changes from the NuGet catalog.'
            ''
            'Cursor:'
            "- start: ${{ steps.delta.outputs.cursor_start_utc }}"
            "- end: ${{ steps.delta.outputs.cursor_end_utc }}"
            ''
            'Summary:'
            "- catalog leaves scanned: ${{ steps.delta.outputs.catalog_leaf_count }}"
            "- affected package ids: ${{ steps.delta.outputs.affected_package_count }}"
            "- changed packages: ${{ steps.delta.outputs.changed_package_count }}"
            ''
            'Spectre.Console.Cli subset:'
            "- matched changed packages: ${{ steps.spectre.outputs.matched_package_count }}"
            "- queued current packages: ${{ steps.spectre.outputs.queue_count }}"
            ''
            'Updated files:'
            '- `state/discovery/dotnet-tools.current.json`'
            '- `state/discovery/dotnet-tools.delta.json`'
            '- `state/discovery/dotnet-tools.cursor.json`'
            '- `state/discovery/dotnet-tools.spectre-console-cli.delta.json`'
            '- `state/discovery/dotnet-tools.spectre-console-cli.queue.json`'
            ''
            'State branch: ${{ steps.resolve.outputs.state_branch }}'
            ''
            'Generated by `${{ github.workflow }}`.'
          ) | Set-Content -Path $bodyPath

      - name: Report no changes
        if: ${{ steps.delta.outputs.changed_package_count == '0' }}
        shell: pwsh
        run: |
          Write-Host 'No added or updated dotnet tools were discovered.'

      - name: Open pull request
        if: ${{ steps.delta.outputs.changed_package_count != '0' && steps.resolve.outputs.apply_mode == 'pull_request' }}
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/discovery-dotnet-tool-updates
          delete-branch: true
          add-paths: |
            state/discovery/**
          commit-message: |
            chore(discovery): update dotnet-tool delta

            Catalog-driven delta discovery for dotnet-tool additions and latest-version changes.
          title: "chore(discovery): update dotnet-tool delta"
          body-path: ${{ steps.delta.outputs.body_path }}

      - name: Report pull request result
        if: ${{ steps.delta.outputs.changed_package_count != '0' && steps.resolve.outputs.apply_mode == 'pull_request' }}
        shell: pwsh
        run: |
          Write-Host "Pull request operation: ${{ steps.cpr.outputs.pull-request-operation }}"
          if ('${{ steps.cpr.outputs.pull-request-url }}') {
            Write-Host "Pull request URL: ${{ steps.cpr.outputs.pull-request-url }}"
          }

      - name: Commit discovery state to state branch
        if: ${{ steps.delta.outputs.changed_package_count != '0' && steps.resolve.outputs.apply_mode == 'commit_and_dispatch' }}
        id: commit
        shell: pwsh
        run: |
          $stateBranch = '${{ steps.resolve.outputs.state_branch }}'
          $stateSnapshotRoot = Join-Path $env:RUNNER_TEMP 'discovery-state-snapshot'
          $stateSnapshotPath = Join-Path $stateSnapshotRoot 'discovery'
          $stateWorktree = Join-Path $env:RUNNER_TEMP 'discovery-state-worktree'

          if (Test-Path $stateSnapshotRoot) {
            Remove-Item $stateSnapshotRoot -Recurse -Force
          }

          if (Test-Path $stateWorktree) {
            Remove-Item $stateWorktree -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stateSnapshotRoot -Force | Out-Null
          Copy-Item state/discovery $stateSnapshotPath -Recurse -Force

          git ls-remote --exit-code --heads origin $stateBranch *> $null
          $branchExists = $LASTEXITCODE -eq 0

          try {
            if ($branchExists) {
              git fetch origin $stateBranch --depth=1
              git worktree add --detach $stateWorktree "origin/$stateBranch"
              git -C $stateWorktree checkout -B $stateBranch "origin/$stateBranch"
            }
            else {
              git worktree add --detach $stateWorktree HEAD
              git -C $stateWorktree checkout -B $stateBranch
            }

            $targetDiscoveryPath = Join-Path $stateWorktree 'state/discovery'
            if (Test-Path $targetDiscoveryPath) {
              Remove-Item $targetDiscoveryPath -Recurse -Force
            }

            New-Item -ItemType Directory -Path (Split-Path -Parent $targetDiscoveryPath) -Force | Out-Null
            Copy-Item $stateSnapshotPath $targetDiscoveryPath -Recurse -Force

            git -C $stateWorktree config user.name 'github-actions[bot]'
            git -C $stateWorktree config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git -C $stateWorktree add state/discovery

            git -C $stateWorktree diff --cached --quiet --exit-code
            $hasChanges = $LASTEXITCODE -ne 0

            if (-not $hasChanges) {
              if (-not $branchExists) {
                git -C $stateWorktree push --set-upstream origin $stateBranch
                $commitSha = (git -C $stateWorktree rev-parse HEAD).Trim()
                "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT
                Write-Host "Seeded discovery state branch $stateBranch at $commitSha."
              }
              else {
                $commitSha = (git -C $stateWorktree rev-parse HEAD).Trim()
                "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT
                Write-Host "No discovery state changes to commit; keeping $stateBranch at $commitSha."
              }

              exit 0
            }

            git -C $stateWorktree commit -m 'chore(discovery): update dotnet-tool delta'

            if ($branchExists) {
              git -C $stateWorktree push origin "HEAD:$stateBranch"
            }
            else {
              git -C $stateWorktree push --set-upstream origin $stateBranch
            }

            $commitSha = (git -C $stateWorktree rev-parse HEAD).Trim()
            "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT
            Write-Host "Pushed discovery state commit $commitSha to $stateBranch."
          }
          finally {
            git worktree remove $stateWorktree --force *> $null
          }

      - name: Dispatch queue analysis
        if: >-
          ${{
            steps.delta.outputs.changed_package_count != '0' &&
            steps.resolve.outputs.apply_mode == 'commit_and_dispatch' &&
            steps.spectre.outputs.queue_count != '' &&
            steps.spectre.outputs.queue_count != '0'
          }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run dispatch-discovery-queue-analysis.yml `
            --repo '${{ github.repository }}' `
            --ref '${{ github.ref_name }}' `
            -f target_branch='${{ steps.resolve.outputs.target_branch }}' `
            -f state_branch='${{ steps.resolve.outputs.state_branch }}' `
            -f queue_path='state/discovery/dotnet-tools.spectre-console-cli.queue.json' `
            -f batch_size='250'

          Write-Host "Dispatched queue analysis from ${{ steps.resolve.outputs.state_branch }} to ${{ steps.resolve.outputs.target_branch }}."
