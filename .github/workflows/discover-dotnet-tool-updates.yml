name: Discover Dotnet Tool Updates

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update with discovery state
        required: true
        default: main
        type: string
      apply_mode:
        description: How discovery results should be applied
        required: true
        default: pull_request
        type: choice
        options:
          - pull_request
          - commit_and_dispatch
      overlap_minutes:
        description: Catalog overlap window in minutes
        required: true
        default: "30"
        type: string
      seed_cursor_utc:
        description: Optional ISO-8601 cursor seed if state file is missing
        required: false
        default: ""
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: discover-dotnet-tool-updates
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ inputs.target_branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run dotnet-tool delta discovery
        id: delta
        shell: pwsh
        run: |
          $args = @(
            'run',
            '--project', 'src/InSpectra.Discovery.Bootstrap',
            '--',
            'index', 'delta',
            '--json',
            '--overlap-minutes', '${{ inputs.overlap_minutes }}'
          )

          if (-not [string]::IsNullOrWhiteSpace('${{ inputs.seed_cursor_utc }}')) {
            $args += @('--seed-cursor-utc', '${{ inputs.seed_cursor_utc }}')
          }

          $result = dotnet @args | ConvertFrom-Json
          if (-not $result.ok) {
            throw $result.error.message
          }

          $data = $result.data
          "catalog_leaf_count=$($data.catalogLeafCount)" >> $env:GITHUB_OUTPUT
          "affected_package_count=$($data.affectedPackageCount)" >> $env:GITHUB_OUTPUT
          "changed_package_count=$($data.changedPackageCount)" >> $env:GITHUB_OUTPUT
          "cursor_start_utc=$(([DateTimeOffset]$data.cursorStartUtc).ToString('O'))" >> $env:GITHUB_OUTPUT
          "cursor_end_utc=$(([DateTimeOffset]$data.cursorEndUtc).ToString('O'))" >> $env:GITHUB_OUTPUT

          $bodyPath = Join-Path $env:RUNNER_TEMP 'dotnet-tool-delta-pr-body.md'
          @(
            'Discover dotnet-tool additions and latest-version changes from the NuGet catalog.'
            ''
            'Cursor:'
            "- start: $(([DateTimeOffset]$data.cursorStartUtc).ToString('O'))"
            "- end: $(([DateTimeOffset]$data.cursorEndUtc).ToString('O'))"
            ''
            'Summary:'
            "- catalog leaves scanned: $($data.catalogLeafCount)"
            "- affected package ids: $($data.affectedPackageCount)"
            "- changed packages: $($data.changedPackageCount)"
            ''
            'Updated files:'
            '- `state/discovery/dotnet-tools.current.json`'
            '- `state/discovery/dotnet-tools.delta.json`'
            '- `state/discovery/dotnet-tools.cursor.json`'
            ''
            'Generated by `${{ github.workflow }}`.'
          ) | Set-Content -Path $bodyPath

          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Narrow delta to Spectre.Console.Cli
        if: ${{ steps.delta.outputs.changed_package_count != '0' }}
        id: spectre
        shell: pwsh
        run: |
          $result = dotnet run --project src/InSpectra.Discovery.Bootstrap -- `
            index delta-spectre-console-cli `
            --json | ConvertFrom-Json

          if (-not $result.ok) {
            throw $result.error.message
          }

          $data = $result.data
          "matched_package_count=$($data.matchedPackageCount)" >> $env:GITHUB_OUTPUT
          "queue_count=$($data.queueCount)" >> $env:GITHUB_OUTPUT
          "output_delta_path=$($data.outputDeltaPath)" >> $env:GITHUB_OUTPUT
          "queue_output_path=$($data.queueOutputPath)" >> $env:GITHUB_OUTPUT

      - name: Rewrite pull request body with Spectre.Console.Cli summary
        if: ${{ steps.delta.outputs.changed_package_count != '0' }}
        shell: pwsh
        run: |
          $bodyPath = '${{ steps.delta.outputs.body_path }}'
          @(
            'Discover dotnet-tool additions and latest-version changes from the NuGet catalog.'
            ''
            'Cursor:'
            "- start: ${{ steps.delta.outputs.cursor_start_utc }}"
            "- end: ${{ steps.delta.outputs.cursor_end_utc }}"
            ''
            'Summary:'
            "- catalog leaves scanned: ${{ steps.delta.outputs.catalog_leaf_count }}"
            "- affected package ids: ${{ steps.delta.outputs.affected_package_count }}"
            "- changed packages: ${{ steps.delta.outputs.changed_package_count }}"
            ''
            'Spectre.Console.Cli subset:'
            "- matched changed packages: ${{ steps.spectre.outputs.matched_package_count }}"
            "- queued current packages: ${{ steps.spectre.outputs.queue_count }}"
            ''
            'Updated files:'
            '- `state/discovery/dotnet-tools.current.json`'
            '- `state/discovery/dotnet-tools.delta.json`'
            '- `state/discovery/dotnet-tools.cursor.json`'
            '- `state/discovery/dotnet-tools.spectre-console-cli.delta.json`'
            '- `state/discovery/dotnet-tools.spectre-console-cli.queue.json`'
            ''
            'Generated by `${{ github.workflow }}`.'
          ) | Set-Content -Path $bodyPath

      - name: Report no changes
        if: ${{ steps.delta.outputs.changed_package_count == '0' }}
        shell: pwsh
        run: |
          Write-Host 'No added or updated dotnet tools were discovered.'

      - name: Open pull request
        if: ${{ steps.delta.outputs.changed_package_count != '0' && inputs.apply_mode == 'pull_request' }}
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/discovery-dotnet-tool-updates
          delete-branch: true
          add-paths: |
            state/discovery/**
          commit-message: |
            chore(discovery): update dotnet-tool delta

            Catalog-driven delta discovery for dotnet-tool additions and latest-version changes.
          title: "chore(discovery): update dotnet-tool delta"
          body-path: ${{ steps.delta.outputs.body_path }}

      - name: Report pull request result
        if: ${{ steps.delta.outputs.changed_package_count != '0' && inputs.apply_mode == 'pull_request' }}
        shell: pwsh
        run: |
          Write-Host "Pull request operation: ${{ steps.cpr.outputs.pull-request-operation }}"
          if ('${{ steps.cpr.outputs.pull-request-url }}') {
            Write-Host "Pull request URL: ${{ steps.cpr.outputs.pull-request-url }}"
          }

      - name: Commit discovery state to target branch
        if: ${{ steps.delta.outputs.changed_package_count != '0' && inputs.apply_mode == 'commit_and_dispatch' }}
        id: commit
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add state/discovery

          if ((git diff --cached --quiet --exit-code), $LASTEXITCODE -contains 0) {
            Write-Host 'No staged discovery changes were found.'
            "commit_sha=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          git commit -m 'chore(discovery): update dotnet-tool delta'
          git push origin "HEAD:${{ inputs.target_branch }}"

          $commitSha = (git rev-parse HEAD).Trim()
          "commit_sha=$commitSha" >> $env:GITHUB_OUTPUT
          Write-Host "Pushed discovery state commit $commitSha to ${{ inputs.target_branch }}."

      - name: Dispatch queue analysis
        if: >-
          ${{
            steps.delta.outputs.changed_package_count != '0' &&
            inputs.apply_mode == 'commit_and_dispatch' &&
            steps.spectre.outputs.queue_count != '' &&
            steps.spectre.outputs.queue_count != '0'
          }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run dispatch-discovery-queue-analysis.yml `
            --repo '${{ github.repository }}' `
            --ref '${{ inputs.target_branch }}' `
            -f target_branch='${{ inputs.target_branch }}' `
            -f queue_path='state/discovery/dotnet-tools.spectre-console-cli.queue.json' `
            -f batch_size='250'

          Write-Host "Dispatched queue analysis for ${{ inputs.target_branch }}."
