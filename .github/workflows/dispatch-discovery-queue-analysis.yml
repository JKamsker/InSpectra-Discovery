name: Dispatch Discovery Queue Analysis

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch containing the discovery queue and receiving the promotion PRs
        required: true
        default: main
        type: string
      state_branch:
        description: Branch that stores discovery queue state
        required: true
        default: automation/discovery-state
        type: string
      queue_path:
        description: Queue JSON path to split and dispatch
        required: true
        default: state/discovery/dotnet-tools.all-tools.queue.json
        type: string
      batch_size:
        description: Maximum queue items per dispatched analysis batch
        required: true
        default: "250"
        type: string
      batch_prefix:
        description: Prefix used when naming dispatched batches
        required: false
        default: discovery-queue
        type: string
      force_reanalyze:
        description: Whether to rerun items even if state already marks them successful
        required: false
        default: "false"
        type: string

permissions:
  actions: write
  contents: read
  packages: read

concurrency:
  group: dispatch-discovery-queue-${{ inputs.target_branch }}-${{ inputs.state_branch }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      target_branch: ${{ steps.plan.outputs.target_branch }}
      queue_item_count: ${{ steps.plan.outputs.queue_item_count }}
      batch_count: ${{ steps.plan.outputs.batch_count }}
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install discovery tool
        uses: ./.github/actions/install-discovery-tool
        with:
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}
          github-owner: ${{ github.repository_owner }}

      - name: Materialize queue from state branch
        shell: pwsh
        run: |
          $stateBranch = '${{ inputs.state_branch }}'
          $queuePath = '${{ inputs.queue_path }}'

          git fetch origin $stateBranch --depth=1
          $queueContent = git show "FETCH_HEAD:$queuePath"

          $targetPath = Join-Path $PWD $queuePath
          $targetDirectory = Split-Path -Parent $targetPath
          if ($targetDirectory) {
            New-Item -ItemType Directory -Path $targetDirectory -Force | Out-Null
          }

          [System.IO.File]::WriteAllText(
            $targetPath,
            $queueContent + [Environment]::NewLine,
            [System.Text.UTF8Encoding]::new($false))

      - name: Build queue dispatch plan
        id: plan
        shell: pwsh
        run: |
          $targetBranch = '${{ inputs.target_branch }}'
          $stateBranch = '${{ inputs.state_branch }}'
          $queuePath = '${{ inputs.queue_path }}'
          $batchSize = [int]'${{ inputs.batch_size }}'
          $batchPrefix = '${{ inputs.batch_prefix }}'

          $planPath = Join-Path $env:RUNNER_TEMP 'queue-dispatch-plan.json'
          $plan = inspectra-discovery `
            queue dispatch-plan `
            --queue $queuePath `
            --target-branch $targetBranch `
            --state-branch $stateBranch `
            --batch-prefix $batchPrefix `
            --batch-size $batchSize `
            --output $planPath `
            --json | ConvertFrom-Json
          if (-not $plan.ok) {
            throw $plan.error.message
          }

          $plan = $plan.data
          "target_branch=$($plan.targetBranch)" >> $env:GITHUB_OUTPUT
          "queue_item_count=$($plan.queueItemCount)" >> $env:GITHUB_OUTPUT
          "batch_count=$($plan.batchCount)" >> $env:GITHUB_OUTPUT
          "matrix<<EOF" >> $env:GITHUB_OUTPUT
          ((@($plan.batches) | ConvertTo-Json -Compress -AsArray) ?? '[]') >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Report empty queue
        if: ${{ steps.plan.outputs.queue_item_count == '0' }}
        shell: pwsh
        run: |
          Write-Host 'The scheduled discovery queue is empty.'

  dispatch:
    needs: plan
    if: ${{ needs.plan.outputs.queue_item_count != '0' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - name: Dispatch, watch, and promote batch
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Invoke-GhJson {
            param(
              [Parameter(Mandatory = $true)]
              [string[]]$Arguments,

              [int]$MaxAttempts = 6,

              [int]$DelaySeconds = 5
            )

            $lastErrorMessage = $null
            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              $output = & gh @Arguments 2>&1 | Out-String
              if ($LASTEXITCODE -eq 0) {
                try {
                  if ([string]::IsNullOrWhiteSpace($output)) {
                    throw 'gh returned no JSON output.'
                  }

                  return $output | ConvertFrom-Json -Depth 100
                }
                catch {
                  $lastErrorMessage = $_.Exception.Message
                }
              }
              else {
                $lastErrorMessage = $output.Trim()
              }

              if ($attempt -lt $MaxAttempts) {
                $delay = [Math]::Min($DelaySeconds * $attempt, 30)
                Write-Warning "gh $($Arguments -join ' ') failed on attempt $attempt/$MaxAttempts. Retrying in $delay seconds."
                if (-not [string]::IsNullOrWhiteSpace($lastErrorMessage)) {
                  Write-Warning $lastErrorMessage
                }

                Start-Sleep -Seconds $delay
              }
            }

            throw "gh $($Arguments -join ' ') failed after $MaxAttempts attempts. Last error: $lastErrorMessage"
          }

          function Wait-ForWorkflowRun {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Repository,

              [Parameter(Mandatory = $true)]
              [string]$WorkflowFile,

              [Parameter(Mandatory = $true)]
              [string]$Branch,

              [Parameter(Mandatory = $true)]
              [string]$DisplayTitle,

              [Parameter(Mandatory = $true)]
              [DateTimeOffset]$NotBefore,

              [int]$TimeoutSeconds = 180
            )

            $deadline = [DateTimeOffset]::UtcNow.AddSeconds($TimeoutSeconds)
            while ([DateTimeOffset]::UtcNow -lt $deadline) {
              $runs = @(Invoke-GhJson -Arguments @(
                  'run', 'list',
                  '--repo', $Repository,
                  '--workflow', $WorkflowFile,
                  '--branch', $Branch,
                  '--limit', '50',
                  '--json', 'databaseId,displayTitle,createdAt,status,url'))

              $match = @(
                $runs |
                  Where-Object {
                    $_.displayTitle -eq $DisplayTitle -and
                    ([DateTimeOffset]$_.createdAt) -ge $NotBefore.AddSeconds(-5)
                  } |
                  Sort-Object { [DateTimeOffset]$_.createdAt } -Descending |
                  Select-Object -First 1
              )

              if ($match.Count -gt 0 -and $match[0]) {
                return $match[0]
              }

              Start-Sleep -Seconds 5
            }

            throw "Timed out waiting for workflow '$WorkflowFile' run '$DisplayTitle' on branch '$Branch'."
          }

          function Resolve-WorkflowRunConclusion {
            param(
              [Parameter(Mandatory = $true)]
              [object[]]$Jobs
            )

            $conclusions = @(
              $Jobs |
                ForEach-Object { [string]$_.conclusion } |
                Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

            if ($conclusions.Count -eq 0) {
              return $null
            }

            if ($conclusions -contains 'failure' -or
                $conclusions -contains 'timed_out' -or
                $conclusions -contains 'startup_failure' -or
                $conclusions -contains 'action_required') {
              return 'failure'
            }

            if ($conclusions -contains 'cancelled') {
              return 'cancelled'
            }

            if ($conclusions -contains 'neutral') {
              return 'neutral'
            }

            return 'success'
          }

          function Get-WorkflowRunSnapshot {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Repository,

              [Parameter(Mandatory = $true)]
              [string]$RunId,

              [int]$MinimumJobsForDerivedCompletion = 1
            )

            $view = Invoke-GhJson -Arguments @(
              'run', 'view', $RunId,
              '--repo', $Repository,
              '--json', 'conclusion,status,url,jobs')

            $jobs = @($view.jobs)
            $allJobsCompleted = $jobs.Count -ge $MinimumJobsForDerivedCompletion -and @($jobs | Where-Object { $_.status -ne 'completed' }).Count -eq 0
            $derivedConclusion = if ($allJobsCompleted) {
              Resolve-WorkflowRunConclusion -Jobs $jobs
            }
            else {
              $null
            }

            $isFinal = (
              ($view.status -eq 'completed' -and -not [string]::IsNullOrWhiteSpace([string]$view.conclusion)) -or
              ($allJobsCompleted -and -not [string]::IsNullOrWhiteSpace($derivedConclusion)))

            return [pscustomobject]@{
              status = if ($isFinal) { 'completed' } else { [string]$view.status }
              conclusion = if ($isFinal -and -not [string]::IsNullOrWhiteSpace([string]$view.conclusion)) {
                [string]$view.conclusion
              }
              elseif ($isFinal) {
                $derivedConclusion
              }
              else {
                [string]$view.conclusion
              }
              url = [string]$view.url
              jobCount = $jobs.Count
              completedJobCount = @($jobs | Where-Object { $_.status -eq 'completed' }).Count
              isFinal = $isFinal
            }
          }

          function Wait-ForWorkflowRunCompletion {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Repository,

              [Parameter(Mandatory = $true)]
              [string]$RunId,

              [Parameter(Mandatory = $true)]
              [string]$DisplayName,

              [int]$TimeoutSeconds = 120,

              [int]$PollSeconds = 10,

              [int]$MinimumJobsForDerivedCompletion = 1
            )

            $deadline = [DateTimeOffset]::UtcNow.AddSeconds($TimeoutSeconds)
            $lastProgressMessage = $null
            while ([DateTimeOffset]::UtcNow -lt $deadline) {
              $summary = Get-WorkflowRunSnapshot `
                -Repository $Repository `
                -RunId $RunId `
                -MinimumJobsForDerivedCompletion $MinimumJobsForDerivedCompletion

              if ($summary.isFinal) {
                return $summary
              }

              $progressMessage = "$DisplayName is $($summary.status) ($($summary.completedJobCount)/$($summary.jobCount) jobs completed)."
              if ($progressMessage -ne $lastProgressMessage) {
                Write-Host $progressMessage
                $lastProgressMessage = $progressMessage
              }

              Start-Sleep -Seconds $PollSeconds
            }

            throw "Timed out waiting for $DisplayName run '$RunId'. Last observed status '$($summary.status)' with conclusion '$($summary.conclusion)' at '$($summary.url)'."
          }

          $repository = '${{ github.repository }}'
          $workflowRef = '${{ github.ref_name }}'
          $targetBranch = '${{ matrix.targetBranch }}'
          $stateBranch = '${{ matrix.stateBranch }}'
          $batchId = '${{ matrix.batchId }}'
          $queuePath = '${{ matrix.queuePath }}'
          $offset = '${{ matrix.offset }}'
          $take = '${{ matrix.take }}'
          $dispatchStartedAt = [DateTimeOffset]::UtcNow
          $analysisRunName = "Analyze Untrusted Batch / $batchId"

          gh workflow run analyze-untrusted-batch.yml `
            --repo $repository `
            --ref $workflowRef `
            -f batch_id=$batchId `
            -f queue_path=$queuePath `
            -f offset=$offset `
            -f take=$take `
            -f state_branch=$stateBranch `
            -f target_branch=$targetBranch `
            -f force_reanalyze='${{ inputs.force_reanalyze }}'

          $analysisRun = Wait-ForWorkflowRun `
            -Repository $repository `
            -WorkflowFile 'analyze-untrusted-batch.yml' `
            -Branch $workflowRef `
            -DisplayTitle $analysisRunName `
            -NotBefore $dispatchStartedAt

          Write-Host "Tracking analysis run $($analysisRun.databaseId): $($analysisRun.url)"
          $analysisSummary = Wait-ForWorkflowRunCompletion `
            -Repository $repository `
            -RunId $analysisRun.databaseId `
            -DisplayName 'analysis' `
            -TimeoutSeconds 10800 `
            -MinimumJobsForDerivedCompletion 2

          if ($analysisSummary.conclusion -ne 'success') {
            throw "Analysis run '$($analysisRun.databaseId)' completed with conclusion '$($analysisSummary.conclusion)'."
          }

          $promotionDispatchStartedAt = [DateTimeOffset]::UtcNow
          $promotionRunName = "Promote Untrusted Analysis Results / $($analysisRun.databaseId)"

          gh workflow run promote-untrusted-analysis-results.yml `
            --repo $repository `
            --ref $workflowRef `
            -f analysis_run_id="$($analysisRun.databaseId)"

          $promotionRun = Wait-ForWorkflowRun `
            -Repository $repository `
            -WorkflowFile 'promote-untrusted-analysis-results.yml' `
            -Branch $workflowRef `
            -DisplayTitle $promotionRunName `
            -NotBefore $promotionDispatchStartedAt

          Write-Host "Tracking promotion run $($promotionRun.databaseId): $($promotionRun.url)"
          $promotionSummary = Wait-ForWorkflowRunCompletion `
            -Repository $repository `
            -RunId $promotionRun.databaseId `
            -DisplayName 'promotion' `
            -TimeoutSeconds 3600

          if ($promotionSummary.conclusion -ne 'success') {
            throw "Promotion run '$($promotionRun.databaseId)' completed with conclusion '$($promotionSummary.conclusion)'."
          }

          Write-Host "Promotion run completed: $($promotionRun.url)"
          Write-Host "Completed $batchId for $targetBranch with ${{ matrix.itemCount }} queue items."
