name: Dispatch Discovery Queue Analysis

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch containing the discovery queue and receiving the promotion PRs
        required: true
        default: main
        type: string
      state_branch:
        description: Branch that stores discovery queue state
        required: true
        default: automation/discovery-state
        type: string
      queue_path:
        description: Queue JSON path to split and dispatch
        required: true
        default: state/discovery/dotnet-tools.spectre-console-cli.queue.json
        type: string
      batch_size:
        description: Maximum queue items per dispatched analysis batch
        required: true
        default: "250"
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: dispatch-discovery-queue-${{ inputs.target_branch }}-${{ inputs.state_branch }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      target_branch: ${{ steps.plan.outputs.target_branch }}
      queue_item_count: ${{ steps.plan.outputs.queue_item_count }}
      batch_count: ${{ steps.plan.outputs.batch_count }}
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.ref_name }}

      - name: Materialize queue from state branch
        shell: pwsh
        run: |
          $stateBranch = '${{ inputs.state_branch }}'
          $queuePath = '${{ inputs.queue_path }}'

          git fetch origin $stateBranch --depth=1
          $queueContent = git show "FETCH_HEAD:$queuePath"

          $targetPath = Join-Path $PWD $queuePath
          $targetDirectory = Split-Path -Parent $targetPath
          if ($targetDirectory) {
            New-Item -ItemType Directory -Path $targetDirectory -Force | Out-Null
          }

          [System.IO.File]::WriteAllText(
            $targetPath,
            $queueContent + [Environment]::NewLine,
            [System.Text.UTF8Encoding]::new($false))

      - name: Build queue dispatch plan
        id: plan
        shell: pwsh
        run: |
          $targetBranch = '${{ inputs.target_branch }}'
          $stateBranch = '${{ inputs.state_branch }}'
          $queuePath = '${{ inputs.queue_path }}'
          $batchSize = [int]'${{ inputs.batch_size }}'

          $planPath = Join-Path $env:RUNNER_TEMP 'queue-dispatch-plan.json'
          ./scripts/Export-DiscoveryQueueDispatchPlan.ps1 `
            -QueuePath $queuePath `
            -TargetBranch $targetBranch `
            -StateBranch $stateBranch `
            -BatchSize $batchSize `
            -OutputPath $planPath

          $plan = Get-Content $planPath -Raw | ConvertFrom-Json
          "target_branch=$($plan.targetBranch)" >> $env:GITHUB_OUTPUT
          "queue_item_count=$($plan.queueItemCount)" >> $env:GITHUB_OUTPUT
          "batch_count=$($plan.batchCount)" >> $env:GITHUB_OUTPUT
          "matrix<<EOF" >> $env:GITHUB_OUTPUT
          ((@($plan.batches) | ConvertTo-Json -Compress -AsArray) ?? '[]') >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Report empty queue
        if: ${{ steps.plan.outputs.queue_item_count == '0' }}
        shell: pwsh
        run: |
          Write-Host 'The Spectre.Console.Cli discovery queue is empty.'

  dispatch:
    needs: plan
    if: ${{ needs.plan.outputs.queue_item_count != '0' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - name: Dispatch, watch, and promote batch
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Wait-ForWorkflowRun {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Repository,

              [Parameter(Mandatory = $true)]
              [string]$WorkflowFile,

              [Parameter(Mandatory = $true)]
              [string]$Branch,

              [Parameter(Mandatory = $true)]
              [string]$DisplayTitle,

              [Parameter(Mandatory = $true)]
              [DateTimeOffset]$NotBefore,

              [int]$TimeoutSeconds = 180
            )

            $deadline = [DateTimeOffset]::UtcNow.AddSeconds($TimeoutSeconds)
            while ([DateTimeOffset]::UtcNow -lt $deadline) {
              $runs = gh run list `
                --repo $Repository `
                --workflow $WorkflowFile `
                --branch $Branch `
                --limit 20 `
                --json databaseId,displayTitle,createdAt,status,url | ConvertFrom-Json

              $match = @(
                $runs |
                  Where-Object {
                    $_.displayTitle -eq $DisplayTitle -and
                    ([DateTimeOffset]$_.createdAt) -ge $NotBefore.AddSeconds(-5)
                  } |
                  Sort-Object { [DateTimeOffset]$_.createdAt } -Descending |
                  Select-Object -First 1
              )

              if ($match.Count -gt 0 -and $match[0]) {
                return $match[0]
              }

              Start-Sleep -Seconds 5
            }

            throw "Timed out waiting for workflow '$WorkflowFile' run '$DisplayTitle' on branch '$Branch'."
          }

          $repository = '${{ github.repository }}'
          $workflowRef = '${{ github.ref_name }}'
          $targetBranch = '${{ matrix.targetBranch }}'
          $stateBranch = '${{ matrix.stateBranch }}'
          $batchId = '${{ matrix.batchId }}'
          $queuePath = '${{ matrix.queuePath }}'
          $offset = '${{ matrix.offset }}'
          $take = '${{ matrix.take }}'
          $dispatchStartedAt = [DateTimeOffset]::UtcNow
          $analysisRunName = "Analyze Untrusted Batch / $batchId"

          gh workflow run analyze-untrusted-batch.yml `
            --repo $repository `
            --ref $workflowRef `
            -f batch_id=$batchId `
            -f queue_path=$queuePath `
            -f offset=$offset `
            -f take=$take `
            -f state_branch=$stateBranch `
            -f target_branch=$targetBranch

          $analysisRun = Wait-ForWorkflowRun `
            -Repository $repository `
            -WorkflowFile 'analyze-untrusted-batch.yml' `
            -Branch $workflowRef `
            -DisplayTitle $analysisRunName `
            -NotBefore $dispatchStartedAt

          Write-Host "Watching analysis run $($analysisRun.databaseId): $($analysisRun.url)"
          gh run watch $analysisRun.databaseId --repo $repository --exit-status

          $analysisSummary = gh run view $analysisRun.databaseId `
            --repo $repository `
            --json conclusion,url | ConvertFrom-Json

          if ($analysisSummary.conclusion -ne 'success') {
            throw "Analysis run '$($analysisRun.databaseId)' completed with conclusion '$($analysisSummary.conclusion)'."
          }

          $promotionDispatchStartedAt = [DateTimeOffset]::UtcNow
          $promotionRunName = "Promote Untrusted Analysis Results / $($analysisRun.databaseId)"

          gh workflow run promote-untrusted-analysis-results.yml `
            --repo $repository `
            --ref $workflowRef `
            -f analysis_run_id="$($analysisRun.databaseId)"

          $promotionRun = Wait-ForWorkflowRun `
            -Repository $repository `
            -WorkflowFile 'promote-untrusted-analysis-results.yml' `
            -Branch $workflowRef `
            -DisplayTitle $promotionRunName `
            -NotBefore $promotionDispatchStartedAt

          Write-Host "Watching promotion run $($promotionRun.databaseId): $($promotionRun.url)"
          gh run watch $promotionRun.databaseId --repo $repository --exit-status

          $prBranch = "automation/untrusted-$batchId-$($analysisRun.databaseId)"
          $pullRequest = @(
            gh pr list `
              --repo $repository `
              --state open `
              --base $targetBranch `
              --head $prBranch `
              --json number,url,title | ConvertFrom-Json
          ) | Select-Object -First 1

          if ($pullRequest) {
            Write-Host "Pull request: $($pullRequest.url)"
          }
          else {
            Write-Warning "Promotion completed but no open PR was found for branch '$prBranch'."
          }

          Write-Host "Completed $batchId for $targetBranch with ${{ matrix.itemCount }} queue items."
